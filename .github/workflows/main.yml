name: Login to Majsoul

on:
  schedule:
    - cron: '5 21 * * *'  # 21:05 UTC time (6:05 a.m. Korean time)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Execute month ticket automation
        run: npm start
        env:
          UID: ${{ secrets.UID }}
          TOKEN: ${{ secrets.TOKEN }}
          EMAIL: ${{ secrets.EMAIL }}
          PASSWORD: ${{ secrets.PASSWORD }}
          MS_SERVER: ${{ secrets.MS_SERVER }}

      - name: Update Keep-Alive and Resource Cache
        if: always()
        run: |
          echo "Last run: $(date)" > keep_alive.txt
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add keep_alive.txt resource-version.json
          git diff --cached --quiet || git commit -m "Update runtime cache"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
